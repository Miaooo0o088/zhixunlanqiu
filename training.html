
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时训练 - AI篮球训练营</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/training.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">
                <a href="index.html">AI篮球训练营</a>
            </div>
            <button class="nav-toggle" aria-label="切换导航菜单" title="切换导航菜单">
                <i class="fas fa-bars"></i>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">
                    <i class="fas fa-home"></i> 首页
                </a></li>
                <li><a href="training.html" class="active">
                    <i class="fas fa-running"></i> 实时训练
                </a></li>
                <li><a href="courses.html">
                    <i class="fas fa-star"></i> 明星课程
                </a></li>
                <li><a href="leaderboard.html">
                    <i class="fas fa-trophy"></i> 排行榜
                </a></li>
                <li><a href="community.html">
                    <i class="fas fa-users"></i> 社区
                </a></li>
                <li><a href="profile.html">
                    <i class="fas fa-user"></i> 个人中心
                </a></li>
                <li class="auth-links">
                    <a href="auth.html" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="training-page">
        <div class="container">
            <h1>实时训练</h1>
            <div class="card-grid">
                <!-- 投篮训练卡片 -->
                <div class="card card-primary training-card" data-type="shooting">
                    <div class="card-header">
                        <h3 class="card-title">投篮训练</h3>
                    </div>
                    <div class="card-body">
                        <div class="training-preview">
                            <img src="images\R-C (2).jpg" alt="投篮训练预览">
                            <div class="preview-text">
                                <h4>AI辅助投篮训练</h4>
                                <p>实时分析投篮姿势，提供专业指导</p>
                            </div>
                        </div>
                        <div class="training-stats">
                            <div class="stat-item">
                                <span>准确率</span>
                                <span class="value">85%</span>
                            </div>
                            <div class="stat-item">
                                <span>标准度</span>
                                <span class="value">90%</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="start-btn" onclick="requestCamera('shooting')">
                            <span>
                                <i class="fas fa-play"></i>
                                开始训练
                            </span>
                        </button>
                    </div>
                </div>

                <!-- 运球训练卡片 -->
                <div class="card card-secondary training-card" data-type="dribbling">
                    <div class="card-header">
                        <h3 class="card-title">运球训练</h3>
                    </div>
                    <div class="card-body">
                        <div class="training-preview">
                            <img src="images\原地运球.jpg" alt="运球训练预览">
                            <div class="preview-text">
                                <h4>AI辅助运球训练</h4>
                                <p>实时分析运球动作，提升控球能力</p>
                            </div>
                        </div>
                        <div class="training-stats">
                            <div class="stat-item">
                                <span>稳定性</span>
                                <span class="value">88%</span>
                            </div>
                            <div class="stat-item">
                                <span>速度</span>
                                <span class="value">92%</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-primary start-btn" onclick="requestCamera('dribbling')">
                            开始训练
                        </button>
                    </div>
                </div>
            </div>

            <!-- 视频区域 (上移) -->
            <div class="video-container">
                <div class="camera-feed">
                    <video id="camera" autoplay playsinline></video>
                    <div class="analysis-overlay">
                        <div class="pose-markers">
                            <!-- AI分析标记点将通过JS动态添加 -->
                        </div>
                        <div class="analysis-info">
                            <div class="analysis-status">
                                <i class="fas fa-circle-notch fa-spin"></i>
                                <span>AI实时分析中...</span>
                            </div>
                            <div class="analysis-metrics">
                                <div class="metric">
                                    <label>姿势准确度</label>
                                    <span class="accuracy">95%</span>
                                </div>
                                <div class="metric">
                                    <label>动作流畅度</label>
                                    <span class="smoothness">90%</span>
                                </div>
                                <div class="analysis-feedback">
                                    <i class="fas fa-comment-dots"></i>
                                    <span id="feedback-text">动作标准</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="camera-controls">
                        <button class="btn-control" id="toggleAnalysis">
                            <i class="fas fa-brain"></i>
                            <span>AI分析</span>
                        </button>
                        <button class="btn-control" id="toggleGuide">
                            <i class="fas fa-vector-square"></i>
                            <span>参考线</span>
                        </button>
                        <button class="btn-control" id="toggleCamera" onclick="switchCamera()">
                            <i class="fas fa-camera"></i>
                            <span>前置相机</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 训练记录 (下移) -->
            <div class="training-history card">
                <h2>训练记录</h2>
                <div class="training-records">
                    <!-- 训练记录将动态插入这里 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 相机权限提示弹窗 -->
    <div class="camera-modal" id="cameraModal">
        <div class="modal-content">
            <h2>相机权限请求</h2>
            <p>为了进行实时姿势分析，我们需要访问您的相机</p>
            <div class="modal-buttons">
                <button class="btn cancel-btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary confirm-btn" onclick="startTraining()">允许</button>
            </div>
        </div>
    </div>

    <!-- 训练总结报告弹窗 -->
    <div class="report-modal" id="reportModal">
        <div class="modal-content">
            <h2 class="modal-title">训练总结报告</h2>
            
            <div class="report-summary">
                <div class="summary-item">
                    <span class="label">平均准确度</span>
                    <span class="value" id="report-accuracy">--%</span>
                </div>
                <div class="summary-item">
                    <span class="label">平均流畅度</span>
                    <span class="value" id="report-smoothness">--%</span>
                </div>
                <div class="summary-item">
                    <span class="label">训练时长</span>
                    <span class="value" id="report-duration">--</span>
                </div>
            </div>

            <div class="report-chart">
                <canvas id="accuracyChart"></canvas>
            </div>

            <div class="report-feedback">
                <h4><i class="fas fa-bullseye"></i> AI教练核心建议</h4>
                <p id="report-coach-tip">暂无建议</p>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-primary confirm-btn" id="saveReportBtn">保存并关闭</button>
            </div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/training.js"></script>
</body>
</html>
