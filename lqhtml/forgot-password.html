<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - AI篮球训练营</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <header>
        <nav>
            <ul>
                <li><a href="auth.html"><i class="fas fa-arrow-left"></i> 返回登录</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="images/logo.png" alt="AI篮球训练营" class="auth-logo">
                <h1>重置密码</h1>
                <p>请输入手机号码，我们将发送验证码帮助您重置密码</p>
            </div>

            <div class="auth-content">
                <form id="resetPasswordForm" class="auth-form">
                    <div class="form-group">
                        <label for="phone">手机号</label>
                        <input type="tel" id="phone" name="phone" placeholder="请输入手机号" pattern="[0-9]{11}" required>
                    </div>

                    <div class="form-group">
                        <label for="verifyCode">验证码</label>
                        <div class="code-input">
                            <input type="text" id="verifyCode" name="verifyCode" placeholder="请输入验证码" maxlength="6" required>
                            <button type="button" class="send-code-btn">获取验证码</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <div class="password-input">
                            <input type="password" id="newPassword" name="newPassword" placeholder="请设置新密码" required>
                            <button type="button" class="toggle-password">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar"></div>
                            <span class="strength-text">密码强度：弱</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">确认新密码</label>
                        <div class="password-input">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入新密码" required>
                            <button type="button" class="toggle-password">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="auth-buttons">
                        <button type="submit" class="login-btn">重置密码</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/forgot-password.js"></script>
</body>
</html>
