<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明星课程 - AI篮球训练营</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/courses.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">
                <a href="index.html">AI篮球训练营</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">
                    <i class="fas fa-home"></i> 首页
                </a></li>
                <li><a href="training.html">
                    <i class="fas fa-running"></i> 实时训练
                </a></li>
                <li><a href="courses.html" class="active">
                    <i class="fas fa-star"></i> 明星课程
                </a></li>
                <li><a href="leaderboard.html">
                    <i class="fas fa-trophy"></i> 排行榜
                </a></li>
                <li><a href="community.html">
                    <i class="fas fa-users"></i> 社区
                </a></li>
                <li><a href="profile.html">
                    <i class="fas fa-user"></i> 个人中心
                </a></li>
                <li class="auth-links">
                    <a href="auth.html" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="page-container">
        <div class="content-section">
            <h1 class="page-title">明星课程</h1>
            <div class="course-filters">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="shooting">投篮</button>
                <button class="filter-btn" data-category="dribbling">运球</button>
                <button class="filter-btn" data-category="defense">防守</button>
            </div>
            <div class="courses-grid">
                <!-- 投篮类课程 -->
                <div class="course-card" data-category="shooting">
                    <img src="images\库里投篮训练.jpg" alt="库里投篮技巧">
                    <div class="course-info">
                        <span class="course-tag">投篮</span>
                        <h3>库里投篮技巧</h3>
                        <p class="course-desc">跟随NBA超级球星学习精准三分球技巧</p>
                        <div class="course-meta">
                            <span><i class="fas fa-clock"></i> 12课时</span>
                            <span><i class="fas fa-user"></i> 1000+学员</span>
                        </div>
                        <button class="btn btn-primary">立即报名</button>
                    </div>
                </div>

                <div class="course-card" data-category="shooting">
                    <img src="images\正确的投篮姿势.jpg" alt="投篮基础训练">
                    <div class="course-info">
                        <span class="course-tag">投篮</span>
                        <h3>投篮基础训练</h3>
                        <p class="course-desc">从零开始掌握标准投篮姿势</p>
                        <div class="course-meta">
                            <span><i class="fas fa-clock"></i> 8课时</span>
                            <span><i class="fas fa-user"></i> 2000+学员</span>
                        </div>
                        <button class="btn btn-primary">立即报名</button>
                    </div>
                </div>

                <!-- 运球类课程 -->
                <div class="course-card" data-category="dribbling">
                    <img src="images\欧文运球.jpg" alt="高级运球技巧">
                    <div class="course-info">
                        <span class="course-tag">运球</span>
                        <h3>高级运球技巧</h3>
                        <p class="course-desc">掌握欧洲步、背后运球等进阶技巧</p>
                        <div class="course-meta">
                            <span><i class="fas fa-clock"></i> 10课时</span>
                            <span><i class="fas fa-user"></i> 800+学员</span>
                        </div>
                        <button class="btn btn-primary">立即报名</button>
                    </div>
                </div>

                <!-- 防守类课程 -->
                <div class="course-card" data-category="defense">
                    <img src="images\伦纳德防守技巧.jpg" alt="防守大师课程">
                    <div class="course-info">
                        <span class="course-tag">防守</span>
                        <h3>防守大师课程</h3>
                        <p class="course-desc">学习专业的防守站位和技巧</p>
                        <div class="course-meta">
                            <span><i class="fas fa-clock"></i> 15课时</span>
                            <span><i class="fas fa-user"></i> 500+学员</span>
                        </div>
                        <button class="btn btn-primary">立即报名</button>
                    </div>
                </div>

                <!-- 更多课程... -->
            </div>
        </div>
    </main>

    <script src="js/nav.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
