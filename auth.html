<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - AI篮球训练营</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <header class="nav-container">
        <nav>
            <div class="nav-brand">
                <i class="fas fa-basketball-ball"></i>
                <a href="index.html">AI篮球训练营</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="courses.html"><i class="fas fa-graduation-cap"></i> 课程</a></li>
                <li><a href="training.html"><i class="fas fa-running"></i> 训练</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> 个人中心</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="images/logo.png" alt="AI篮球训练营" class="auth-logo">
                <h1>欢迎加入AI篮球训练营</h1>
                <p>提升你的篮球技能，开启AI辅助训练之旅</p>
            </div>

            <div class="auth-content">
                <!-- 登录表单 -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">邮箱/手机号</label>
                        <input type="text" id="email" name="email" placeholder="请输入邮箱或手机号" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="password-input">
                            <input type="password" id="password" name="password" placeholder="请输入密码" required>
                            <button type="button" class="toggle-password">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>记住我</span>
                        </label>
                        <a href="forgot-password.html" class="forgot-password">忘记密码？</a>
                    </div>

                    <div class="auth-buttons">
                        <button type="submit" class="login-btn">登录</button>
                        <a href="register.html" class="register-btn">注册账号</a>
                    </div>

                    <div class="social-login">
                        <p>其他登录方式</p>
                        <div class="social-buttons">
                            <button type="button" class="social-btn wechat">
                                <i class="fab fa-weixin"></i>
                            </button>
                            <button type="button" class="social-btn qq">
                                <i class="fab fa-qq"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
